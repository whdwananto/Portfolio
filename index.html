<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="welcome">Welcome</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="particles-js"></div>
    <nav class="navbar fixed-top">
        <div class="container d-flex justify-content-end align-items-center gap-3">

            <div class="d-flex align-items-center gap-2">
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" role="switch" id="themeToggle">
                </div>

                <label for="themeToggle" class="small mb-0 text-light" data-key="dark_mode">
                    Dark Mode
                </label>
            </div>

            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                    🌐
                    <span class="me-1" data-key="language">
                        Language
                    </span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" href="#" id="lang-id">
                            Indonesia
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="#" id="lang-en">
                            English
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>

    <div class="welcome-wrapper">
        <div class="welcome-container">

            <div class="card-theme">

                <span class="badge bg-info text-dark mb-3" data-key="welcome">
                    Welcome
                </span>

                <h1 class="fw-bold mb-3" data-key="before_login">
                    Before logging in, please enter your name
                </h1>

                <p class="text-secondary mb-4" data-key="please_enter_name">
                    Please enter your name for a more personalized experience
                </p>

                <form onsubmit="simpanNama(); return false;">

                    <input type="text" id="nama" class="form-control form-control-lg mb-3" placeholder="Enter your name"
                        data-key="enter_name" required>

                    <button type="submit" class="btn btn-info btn-lg w-100" data-key="login">
                        Enter Portfolio
                    </button>

                </form>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dark-mode.js"></script>
    <script src="js/lang.js"></script>
    <script type="module" src="js/visitor.js"></script>
</body>
</html>
