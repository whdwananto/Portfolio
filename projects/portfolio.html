<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-key="app_portfolio">Portfolio Website</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>

<body data-feature="feature_portfolio">
    <nav class="navbar fixed-top">
        <div class="container d-flex justify-content-end align-items-center gap-3">

            <div class="d-flex align-items-center gap-2">
                <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" role="switch" id="themeToggle">
                </div>

                <label for="themeToggle" class="small mb-0 text-light" data-key="dark_mode">
                    Dark Mode
                </label>
            </div>

            <div class="dropdown">
                <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown">
                    🌐
                    <span class="me-1" data-key="language">
                        Language
                    </span>
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li>
                        <a class="dropdown-item" id="lang-id">
                            Indonesia
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" id="lang-en">
                            English
                        </a>
                    </li>
                </ul>
            </div>

        </div>
    </nav>
    <div class="container py-5">
        <div class="row align-items-center">

            <div class="col-lg-6">

                <h1 class="fw-bold mb-3" data-key="app_portfolio">
                    Portfolio
                </h1>

                <p class="lead" data-key="app_portfolio_summary">
                </p>

                <div class="mb-4">
                    <span class="badge bg-primary">HTML</span>
                    <span class="badge bg-danger">Bootstrap</span>
                    <span class="badge bg-success">CSS</span>
                    <span class="badge bg-warning text-dark">JavaScript</span>


                    <!-- <span class="badge bg-primary">Primary</span>
                    <span class="badge bg-warning text-dark">Warning</span>
                    <span class="badge bg-info text-dark">Info</span>
                    <span class="badge bg-success">Success</span>
                    <span class="badge bg-danger">Danger</span>
                    <span class="badge bg-secondary">Secondary</span>
                    <span class="badge bg-dark">Dark</span> -->

                </div>
                <div class="d-flex gap-2">
                    <a href="https://github.com/whdwananto/portfolio" target="_blank" class="btn btn-dark">
                        <i class="bi bi-github"></i> GitHub
                    </a>

                    <a href="https://portfolio-whdwananto.netlify.app/ " target="_blank" class="btn btn-dark">
                        <i class="bi bi-box-arrow-up-right"></i> Live Demo
                    </a>
                </div>

            </div>

            <div class="col-lg-6 mt-4 mt-lg-0">

                <img src="../assets/portfolio/portfolio.png" class="img-fluid hero-img">

            </div>

        </div>

        <hr class="my-5">

        <h2 class="mb-4" data-key="about_project">
            About Project
        </h2>

        <p data-key="app_portfolio_desc">

        </p>

        <h2 class="mt-5 mb-4" data-key="feature">
            Feature
        </h2>

        <div class="row g-4">

            <div class="row" id="feature-container"></div>

        </div>

        <h2 class="mt-5 mb-4" data-key="documentation">
            Documentation
        </h2>

        <div class="row g-4" id="gallery-container"></div>

        <div class="modal fade" id="imagePreviewModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content">

                    <div class="modal-header">
                        <h5 class="modal-title" id="imagePreviewTitle">
                            Preview
                        </h5>

                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body text-center">
                        <img id="imagePreview" class="img-fluid" src="" alt="">
                    </div>

                </div>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/darkMode.js"></script>
    <script src="../js/lang.js"></script>
    <script src="../js/renderFeatures.js"></script>
    <script src="../js/data-images.js"></script>
    <script src="../js/renderGallery.js"></script>
    <script type="module">
        import { initImagePreview } from "../js/imagepreview.js";

        renderGallery("portfolio");
        initImagePreview();
    </script>
</body>

</html>
